name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_RPC_URL: https://soroban-testnet.stellar.org
  NEXT_PUBLIC_NETWORK: testnet
  NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
  NEXT_PUBLIC_CONTRACT_ID: CDOTOFALVP7MIH35P3CK6I3W6PEZPO4K6DJJLU2XPCSALENFYRPCUVAD

jobs:
  # ──────────────────────────────────────────
  # 1. Frontend: lint, type-check, test, build
  # ──────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 0 || true

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: out/
          retention-days: 7

  # ──────────────────────────────────────────
  # 2. Contracts: WASM build + Rust unit tests
  # ──────────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build WASM (prediction_market)
        run: |
          cargo build \
            --manifest-path prediction_market/Cargo.toml \
            --target wasm32-unknown-unknown \
            --release

      - name: Build WASM (oracle)
        run: |
          cargo build \
            --manifest-path oracle/Cargo.toml \
            --target wasm32-unknown-unknown \
            --release

      - name: Run unit tests
        run: cargo test --workspace

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: |
            contracts/target/wasm32-unknown-unknown/release/prediction_market.wasm
            contracts/target/wasm32-unknown-unknown/release/oracle.wasm
          retention-days: 7
